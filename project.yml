name: ScreenshotBuddy
options:
  bundleIdPrefix: com.hugh
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""          # set to your Team ID once the Apple account is approved
    CODE_SIGN_STYLE: Automatic

targets:
  ScreenshotBuddy:
    type: application
    platform: macOS
    sources:
      - path: Source
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: ScreenshotBuddy
        PRODUCT_BUNDLE_IDENTIFIER: com.hugh.screenshotbuddy
        INFOPLIST_FILE: Source/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Source/ScreenshotBuddy.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        COMBINE_HIDPI_IMAGES: YES

  ScreenshotBuddyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ScreenshotBuddyTests
    dependencies:
      - target: ScreenshotBuddy
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ScreenshotBuddy.app/Contents/MacOS/ScreenshotBuddy"
