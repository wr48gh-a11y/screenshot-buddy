<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Screenshot Daddy — Welcome (Final)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Helvetica, sans-serif;
    background: #0c0c10; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; }
  .window { width: 720px; height: 480px; border-radius: 16px; overflow: hidden; position: relative;
    box-shadow: 0 30px 90px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.06);
    background: radial-gradient(ellipse 80% 62% at 50% 118%, #4a2f9e 0%, #241a4d 46%, #120c26 100%); }
  .traffic { position: absolute; top: 16px; left: 18px; display: flex; gap: 8px; }
  .traffic span { width: 12px; height: 12px; border-radius: 50%; }
  .traffic span:nth-child(1){ background:#ff5f57; } .traffic span:nth-child(2){ background:#febc2e; } .traffic span:nth-child(3){ background:#28c840; }
  .inner { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
  .badge { font-size: 12px; font-weight: 600; letter-spacing: 2.2px; color: #c9b8ff;
    border: 1px solid rgba(160,120,255,.4); border-radius: 20px; padding: 7px 18px; margin-bottom: 30px; }
  h1 { font-size: 44px; font-weight: 700; letter-spacing: -.8px; line-height: 1.08; color: #fff; }
  h1 em { font-style: normal; background: linear-gradient(90deg,#9b6dff,#d98aff);
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .tag { color: #b9aee6; font-size: 16px; line-height: 1.5; margin-top: 20px; max-width: 460px; }
  .pill { display: inline-block; margin-top: 38px; padding: 13px 40px; border-radius: 30px; color: #fff; font-weight: 600; font-size: 15px;
    background: linear-gradient(90deg, #7b4dff, #b44dff); box-shadow: 0 8px 28px rgba(123,77,255,.5); }
  .later { margin-top: 16px; color: #8f84c4; font-size: 12.5px; }
</style>
</head>
<body>
  <div class="window">
    <div class="traffic"><span></span><span></span><span></span></div>
    <div class="inner">
      <div class="badge">SCREENSHOT DADDY</div>
      <h1>Your desktop called.<br><em>Daddy's cleaning up.</em></h1>
      <div class="tag">Every screenshot lives in your menu bar, one click away.<br>When it starts to pile up, sweep it all away.</div>
      <div class="pill">Connect Screenshots Folder</div>
      <div class="later">Maybe later</div>
    </div>
  </div>
</body>
</html>
